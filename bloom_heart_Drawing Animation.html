<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom Heart</title>
  <style>
      :root {
        --bg1: #08060d;
        --bg2: #1a1026;             /*to change center woed in the heart edite line 106 and made by in line 102 and 103 */
        --bg3: #2a1230;
        --pink: #ff5d98;
        --white: #fff7fb;
      }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      overflow:hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,93,152,.13), transparent 25%),
        radial-gradient(circle at 82% 24%, rgba(255,216,107,.10), transparent 22%),
        radial-gradient(circle at 50% 85%, rgba(255,255,255,.05), transparent 30%),
        linear-gradient(180deg, #2a1230, #1a1026 48%, #08060d);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    canvas{
      position:fixed;
      inset:0;
      display:block;
      width:100%;
      height:100%;
    }
    .overlay{
      position:fixed;
      inset:0;
      pointer-events:none;
      display:grid;
      place-items:center;
    }
    .title{
      text-align:center;
      opacity:0;
      transform:translateY(18px) scale(.96);
      transition:1.2s ease;
    }
    .title.show{
      opacity:1;
      transform:translateY(0) scale(1);
    }
    .main{
      color:var(--white);
      font-size:clamp(18px, 3.5vw, 40px);                       /*  to chamge the size of center word  */
      font-weight:800;
      letter-spacing:.12em;
      text-shadow:0 0 14px rgba(255,255,255,.18), 0 0 26px rgba(255,93,152,.18);
    }
    .sub{
      margin-top:10px;
      color:rgba(255, 216, 232, .78);
      font-size:clamp(12px, 1.7vw, 18px);
      letter-spacing:.4em;
      text-transform:uppercase;
    }
    .sig, .fromto{
      position:fixed;
      bottom:16px;
      color:rgba(255,255,255,.62);
      font-size:12px;
      letter-spacing:.08em;
      z-index:3;
      user-select:none;
      pointer-events:none;
      opacity:0;
      transform:translateY(10px);
      transition:opacity .9s ease, transform .9s ease;
    }
    .sig{
      right:20px;
      text-shadow:0 0 8px rgba(255,93,152,.10);
    }
    .fromto{
      left:20px;                                                
      text-shadow:0 0 8px rgba(255,93,152,.08);
    }
    .sig.show, .fromto.show{
      opacity:1;
      transform:translateY(0);
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div class="overlay">
    <div class="title" id="title">
      <div class="main">MAI</div> 
      <!--<div class="sub">for you</div>-->
    </div>
  </div>

  <div class="fromto" id="fromto">From Amir to ROZA </div>
  <div class="sig" id="sig">made by Amir</div>

  <script>
    const CENTER_WORD = "Love U";                                            <!-- Here to edit the center word -->
    document.querySelector(".main").textContent = CENTER_WORD;

    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const title = document.getElementById("title");
    const sig = document.getElementById("sig");
    const fromto = document.getElementById("fromto");

    let W=0,H=0,CX=0,CY=0,DPR=1;

    function resize(){
      DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      W = innerWidth; H = innerHeight;
      canvas.width = W * DPR; canvas.height = H * DPR;
      canvas.style.width = W + "px"; canvas.style.height = H + "px";
      ctx.setTransform(DPR,0,0,DPR,0,0);
      CX = W/2; CY = H/2 - 18;
      buildTargets(); buildStars();
    }
    addEventListener("resize", resize);

    const stars = [];
    function buildStars(){
      stars.length = 0;
      for(let i=0;i<100;i++){
        stars.push({
          x: Math.random()*W, y: Math.random()*H,
          r: Math.random()*1.5 + .4,
          a: Math.random()*Math.PI*2,
          s: Math.random()*0.014 + 0.004
        });
      }
    }

    function heart(t, scale){
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
      return { x:x*scale, y:y*scale };
    }

    const targets = [];
    function buildTargets(){
      targets.length = 0;
      const scale = Math.min(W,H) * 0.0175;
      for(let i=0;i<320;i++){
        const t = (i/320) * Math.PI * 2;
        const p = heart(t, scale);
        targets.push({x: CX+p.x, y: CY+p.y});
      }
    }

    class Seed{
      constructor(target){
        this.tx = target.x; this.ty = target.y;
        this.x = CX; this.y = CY; this.px = this.x; this.py = this.y;
        const ang = Math.atan2(this.ty-CY, this.tx-CX) + (Math.random()-0.5)*0.9;
        const speed = Math.random()*3.4 + 3.6;
        this.vx = Math.cos(ang)*speed; this.vy = Math.sin(ang)*speed;
        this.life = 0; this.dead = false;
        this.hue = Math.random() > .22 ? "pink" : "gold";
      }
      update(){
        this.life++;
        this.px = this.x; this.py = this.y;
        const dx = this.tx - this.x, dy = this.ty - this.y;
        this.vx += dx * 0.007; this.vy += dy * 0.007;
        this.vx *= 0.967; this.vy *= 0.967;
        this.x += this.vx; this.y += this.vy;
        if(Math.hypot(dx,dy) < 6){
          blooms.push(new Bloom(this.tx, this.ty, this.hue));
          outline.push({x:this.tx, y:this.ty, a:0});
          this.dead = true;
        }
        if(this.life > 140) this.dead = true;
      }
      draw(){
        const grad = ctx.createLinearGradient(this.px, this.py, this.x, this.y);
        if(this.hue === "pink"){
          grad.addColorStop(0, "rgba(255,255,255,0)");
          grad.addColorStop(.55, "rgba(255,170,205,.48)");
          grad.addColorStop(1, "rgba(255,93,152,.98)");
        }else{
          grad.addColorStop(0, "rgba(255,255,255,0)");
          grad.addColorStop(.55, "rgba(255,232,170,.45)");
          grad.addColorStop(1, "rgba(255,216,107,.98)");
        }
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.7;
        ctx.beginPath();
        ctx.moveTo(this.px, this.py);
        ctx.lineTo(this.x, this.y);
        ctx.stroke();
      }
    }

    class Bloom{
      constructor(x,y,hue){
        this.x = x; this.y = y; this.hue = hue;
        this.petals = [];
        const count = 5 + Math.floor(Math.random()*3);
        for(let i=0;i<count;i++){
          const a = Math.PI*2*i/count + Math.random()*0.4;
          this.petals.push({
            ang:a, dist:0, max:Math.random()*6 + 5,
            life:1, decay:Math.random()*0.018 + 0.016,
            r:Math.random()*2.4 + 2
          });
        }
        this.dead = false;
      }
      update(){
        let alive = false;
        for(const p of this.petals){
          p.dist += 0.24;
          p.life -= p.decay;
          if(p.life > 0) alive = true;
        }
        this.dead = !alive;
      }
      draw(){
        for(const p of this.petals){
          if(p.life <= 0) continue;
          const px = this.x + Math.cos(p.ang) * Math.min(p.dist, p.max);
          const py = this.y + Math.sin(p.ang) * Math.min(p.dist, p.max);
          ctx.beginPath();
          ctx.fillStyle = this.hue === "pink"
            ? `rgba(255,93,152,${p.life})`
            : `rgba(255,216,107,${p.life})`;
          ctx.arc(px, py, p.r*p.life, 0, Math.PI*2);
          ctx.fill();
        }
      }
    }

    const seeds = [], blooms = [], outline = [];
    let idx = 0, phase = "grow", holdStart = 0, outlineAlpha = 1, fade = 1;

    function spawnBatch(){
      const batch = 5;
      for(let i=0;i<batch && idx<targets.length;i++,idx++){
        seeds.push(new Seed(targets[idx]));
      }
    }

    function drawBackground(){
      ctx.clearRect(0,0,W,H);
      const bg = ctx.createLinearGradient(0,0,0,H);
      bg.addColorStop(0, "#2a1230");
      bg.addColorStop(.52, "#1a1026");
      bg.addColorStop(1, "#08060d");
      ctx.fillStyle = bg;
      ctx.fillRect(0,0,W,H);

      for(const s of stars){
        s.a += s.s;
        const alpha = 0.23 + (Math.sin(s.a)+1)*0.14;
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
      }

      const glow = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.min(W,H)*0.36);
      glow.addColorStop(0, "rgba(255,93,152,0.10)");
      glow.addColorStop(1, "rgba(255,93,152,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(CX,CY,Math.min(W,H)*0.36,0,Math.PI*2);
      ctx.fill();
    }

    function drawOutline(){
      for(const p of outline){
        p.a += (1 - p.a) * 0.07;
        const halo = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,5.5);
        halo.addColorStop(0, `rgba(255,255,255,${0.24*p.a*outlineAlpha})`);
        halo.addColorStop(.45, `rgba(255,93,152,${0.56*p.a*outlineAlpha})`);
        halo.addColorStop(1, "rgba(255,93,152,0)");
        ctx.beginPath();
        ctx.fillStyle = halo;
        ctx.arc(p.x,p.y,2.7,0,Math.PI*2);
        ctx.fill();
      }
      if(outline.length > 10){
        ctx.beginPath();
        ctx.moveTo(outline[0].x, outline[0].y);
        for(let i=1;i<outline.length;i++) ctx.lineTo(outline[i].x, outline[i].y);
        ctx.closePath();
        ctx.strokeStyle = `rgba(255,186,211,${0.92*outlineAlpha})`;
        ctx.lineWidth = 2.2;
        ctx.shadowBlur = 18;
        ctx.shadowColor = "rgba(255,93,152,.45)";
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }

    function reset(){
      seeds.length = 0; blooms.length = 0; outline.length = 0;
      idx = 0; phase = "grow"; holdStart = 0; outlineAlpha = 0;
      title.classList.remove("show");
      sig.classList.remove("show");
      fromto.classList.remove("show");
    }

    function tick(time){
      drawBackground();

      if(phase === "grow"){
        spawnBatch();
        outlineAlpha += (1 - outlineAlpha) * 0.05;
        if(idx >= targets.length && seeds.length === 0){
          phase = "hold";
          holdStart = time;
          title.classList.add("show");
          setTimeout(() => {
            sig.classList.add("show");
            fromto.classList.add("show");
          }, 350);
        }
      } else if(phase === "hold"){
        outlineAlpha = 1;
        if(time - holdStart > 2000) phase = "fade";
      } else if(phase === "fade"){
        fade -= 0.01;
        if(fade < 0.15) fade = 0.15;
        outlineAlpha = fade;
      }

      for(let i=seeds.length-1;i>=0;i--){
        seeds[i].update();
        seeds[i].draw();
        if(seeds[i].dead) seeds.splice(i,1);
      }

      drawOutline();

      for(let i=blooms.length-1;i>=0;i--){
        blooms[i].update();
        blooms[i].draw();
        if(blooms[i].dead) blooms.splice(i,1);
      }

      requestAnimationFrame(tick);
    }

    addEventListener("pointerdown", reset);

    resize();
    reset();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
